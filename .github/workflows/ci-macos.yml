name: CI macOS

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main, dev ]
  release:
    types: [ published ]

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-and-test:
    name: Qt Quick Terminal (macOS)
    runs-on: macos-15-intel
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      zip_name: ${{ steps.package.outputs.zip_name }}

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: vnm_terminal

      - name: Checkout surface
        uses: actions/checkout@v4
        with:
          repository: Varinomics/vnm_terminal_surface
          path: vnm_terminal_surface
          ref: ${{ github.event_name == 'release' && '740569a2b5675370e426d7976eac2c9f00ad2244' || 'master' }}

      - name: Checkout chrome
        uses: actions/checkout@v4
        with:
          repository: imakris/vnm_qml_chrome
          path: vnm_qml_chrome
          ref: ${{ github.event_name == 'release' && '184bd4021afd01e798394049fe5bd835ce5a8c77' || 'master' }}

      - name: Derive package names
        id: package
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            package_version="${GITHUB_REF_NAME#v}"
          else
            package_version="$(
              sed -nE 's/^project\(vnm_terminal .* VERSION ([^ )]+)\).*/\1/p' \
                vnm_terminal/CMakeLists.txt
            )"
          fi

          if [[ -z "${package_version}" ]]; then
            echo "Could not derive package version." >&2
            exit 1
          fi

          echo "artifact_name=vnm_terminal_v${package_version}_macos_x64_unnotarized" >> "${GITHUB_OUTPUT}"
          echo "zip_name=vnm_terminal_v${package_version}_macos_x64_unnotarized.zip" >> "${GITHUB_OUTPUT}"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.10.1'
          arch: 'clang_64'
          archives: 'qtbase qtdeclarative'
          cache: 'true'

      - name: Configure CMake
        run: |
          cmake -B vnm_terminal/build -S vnm_terminal \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DVNM_TERMINAL_SURFACE_SOURCE_DIR="${GITHUB_WORKSPACE}/vnm_terminal_surface" \
            -DVNM_QML_CHROME_SOURCE_DIR="${GITHUB_WORKSPACE}/vnm_qml_chrome" \
            -DVNM_TERMINAL_ENABLE_PROFILING=OFF \
            -DVNM_TERMINAL_ENABLE_TRANSCRIPT_CAPTURE_REPLAY=OFF \
            -DVNM_TERMINAL_DISTRIBUTION_BUILD=ON \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build vnm_terminal/build --config ${CMAKE_BUILD_TYPE} --parallel

      - name: Run tests
        working-directory: vnm_terminal/build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

      - name: Deploy macOS app bundle
        run: |
          app_bundle="vnm_terminal/build/vnm_terminal.app"
          test -d "${app_bundle}"
          "${QT_ROOT_DIR}/bin/macdeployqt" "${app_bundle}" -verbose=2

      - name: Write macOS build info
        run: |
          app_bundle="vnm_terminal/build/vnm_terminal.app"
          resources_dir="${app_bundle}/Contents/Resources"
          mkdir -p "${resources_dir}"
          package_version="$(
            sed -nE 's/^project\(vnm_terminal .* VERSION ([^ )]+)\).*/\1/p' \
              vnm_terminal/CMakeLists.txt
          )"
          if [[ -z "${package_version}" ]]; then
            echo "Could not derive package version." >&2
            exit 1
          fi
          app_commit="$(git -C vnm_terminal rev-parse --verify HEAD)"
          app_branch="$(git -C vnm_terminal rev-parse --abbrev-ref HEAD)"
          surface_commit="$(git -C vnm_terminal_surface rev-parse --verify HEAD)"
          surface_branch="$(git -C vnm_terminal_surface rev-parse --abbrev-ref HEAD)"
          chrome_commit="$(git -C vnm_qml_chrome rev-parse --verify HEAD)"
          chrome_branch="$(git -C vnm_qml_chrome rev-parse --abbrev-ref HEAD)"
          app_state=clean
          surface_state=clean
          chrome_state=clean
          if [[ -n "$(git -C vnm_terminal status --porcelain --untracked-files=all)" ]]; then
            app_state=dirty
          fi
          if [[ -n "$(git -C vnm_terminal_surface status --porcelain --untracked-files=all)" ]]; then
            surface_state=dirty
          fi
          if [[ -n "$(git -C vnm_qml_chrome status --porcelain --untracked-files=all)" ]]; then
            chrome_state=dirty
          fi
          timestamp="$(date -u +%Y-%m-%d_%H:%MZ)"
          {
            echo "Build timestamp: ${timestamp}"
            echo "App source:      ${GITHUB_WORKSPACE}/vnm_terminal"
            echo "App branch:      ${app_branch}"
            echo "App commit:      ${app_commit}"
            echo "App tree state:  ${app_state}"
            echo "Surface source:  ${GITHUB_WORKSPACE}/vnm_terminal_surface"
            echo "Surface branch:  ${surface_branch}"
            echo "Surface commit:  ${surface_commit}"
            echo "Surface state:   ${surface_state}"
            echo "Chrome source:   ${GITHUB_WORKSPACE}/vnm_qml_chrome"
            echo "Chrome branch:   ${chrome_branch}"
            echo "Chrome commit:   ${chrome_commit}"
            echo "Chrome state:    ${chrome_state}"
            echo "Version:         ${package_version}"
            echo "Configuration:   ${CMAKE_BUILD_TYPE}"
            echo "Distribution:    ON"
            echo "Profiling:       OFF"
            echo "Transcript:      OFF"
            echo "Toolchain:       clang"
            echo "Qt:              ${QT_ROOT_DIR}"
          } > "${resources_dir}/vnm_terminal_build_info.txt"

      - name: Sign and validate macOS app bundle
        run: |
          app_bundle="vnm_terminal/build/vnm_terminal.app"
          codesign --force --deep --sign - "${app_bundle}"
          codesign --verify --deep --strict "${app_bundle}"
          QT_QPA_PLATFORM=offscreen "${app_bundle}/Contents/MacOS/vnm_terminal" --help >/tmp/vnm_terminal_help.txt

      - name: Package macOS app bundle
        run: |
          mkdir -p vnm_terminal/dist
          ditto -c -k --sequesterRsrc --keepParent \
            "vnm_terminal/build/vnm_terminal.app" \
            "vnm_terminal/dist/${{ steps.package.outputs.zip_name }}"

      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: vnm_terminal/dist/${{ steps.package.outputs.zip_name }}
          if-no-files-found: error

  attach-release-asset:
    name: Attach macOS Bundle
    if: github.event_name == 'release'
    needs: build-and-test
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download macOS bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-test.outputs.artifact_name }}
          path: dist

      - name: Attach macOS bundle to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${GITHUB_REF_NAME}" \
            "dist/${{ needs.build-and-test.outputs.zip_name }}" \
            --repo "${{ github.repository }}" \
            --clobber
